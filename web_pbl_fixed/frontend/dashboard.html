<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — EventHub</title>
    <link rel="stylesheet" href="notices.css">
    <style>
        .dashboard-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }
        .dashboard-tab-btn {
            padding: 9px 22px;
            border-radius: 20px;
            border: 1.5px solid rgba(59,130,246,.3);
            background: rgba(59,130,246,.08);
            color: #93c5fd;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }
        .dashboard-tab-btn.active,
        .dashboard-tab-btn:hover {
            background: rgba(59,130,246,.22);
            border-color: #3b82f6;
            color: #e0f2fe;
        }
        #studentDashboardTabs { display: none; }
    </style>
</head>
<body>
<div class="c1">
    <aside class="sidebar menu">
        <h2>Navigation</h2>
        <ul>
            <li class="active"><a href="dashboard.html">⭐ Dashboard</a></li>
            <li><a href="notices.html">📢 Notices</a></li>
            <li><a href="profile.html">👤 Profile</a></li>
            <li><a href="settings.html">⚙️ Settings</a></li>
            <li><a href="#" onclick="logout()">🚪 Logout</a></li>
        </ul>
    </aside>

    <main class="content">
        <h1 id="dashboardHeading">⭐ Dashboard</h1>

        <!-- Student tabs: Bookmarks + Registered Events -->
        <div id="studentDashboardTabs" class="dashboard-tabs">
            <button class="dashboard-tab-btn active" id="tabBookmarks" onclick="switchTab('bookmarks')">⭐ Bookmarked Events</button>
            <button class="dashboard-tab-btn" id="tabRegistered" onclick="switchTab('registered')">📝 Registered Events</button>
        </div>

        <div class="events" id="eventsContainer">
            <div class="empty-state">
                <span class="icon">⏳</span>
                <h3>Loading...</h3>
            </div>
        </div>
    </main>
</div>

<div class="toast-container"></div>
<script src="notices.js"></script>
<script>
function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'select-role.html';
}

// Determine role and show tabs for students
(function() {
    const token = localStorage.getItem('token');
    if (!token) return;
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const role = payload.role;
        if (role === 'student') {
            document.getElementById('studentDashboardTabs').style.display = 'flex';
            document.getElementById('dashboardHeading').textContent = '⭐ Dashboard';
        } else {
            document.getElementById('dashboardHeading').textContent = '⭐ Bookmarked Events';
        }
    } catch(e) {}
})();

// Tab switching for students
window._dashboardTab = 'bookmarks'; // default

function switchTab(tab) {
    window._dashboardTab = tab;
    document.getElementById('tabBookmarks').classList.toggle('active', tab === 'bookmarks');
    document.getElementById('tabRegistered').classList.toggle('active', tab === 'registered');
    // Re-trigger dashboard fetch with the right mode
    if (typeof window._dashboardFetch === 'function') {
        window._dashboardFetch(tab);
    }
}
</script>
</body>
</html>
