<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Event Aggregator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 20%, #60a5fa55, transparent 40%),
                        radial-gradient(circle at 80% 80%, #3b82f655, transparent 40%),
                        linear-gradient(135deg, #020617, #1e3a8a, #2563eb);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }

        .signup-container {
            background: #ffffff;
            padding: 35px 30px;
            width: 420px;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
            text-align: center;
            animation: fadeIn 0.4s ease-in-out;
        }

        .signup-container h2 {
            color: #1e3a8a;
            margin-bottom: 5px;
            font-size: 20px;
        }

        .role-selector {
            display: flex;
            gap: 8px;
            margin: 15px 0 20px;
        }

        .role-option {
            flex: 1;
            padding: 10px 8px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .role-option:hover { border-color: #93c5fd; }
        .role-option.active-student { border-color: #2563eb; background: rgba(37,99,235,0.05); }
        .role-option.active-faculty { border-color: #059669; background: rgba(5,150,105,0.05); }
        .role-option.active-admin { border-color: #dc2626; background: rgba(220,38,38,0.05); }

        .role-option .role-emoji { font-size: 22px; display: block; margin-bottom: 4px; }
        .role-option .role-text { font-size: 11px; font-weight: bold; color: #374151; }

        .signup-container input,
        .signup-container select {
            width: 100%;
            padding: 10px 12px;
            margin: 4px 0 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: 0.2s;
        }

        .signup-container input:focus,
        .signup-container select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37,99,235,0.15);
        }

        .field-label {
            text-align: left;
            font-size: 12px;
            font-weight: bold;
            color: #374151;
            margin-top: 6px;
            margin-bottom: 2px;
        }

        .signup-btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            color: #ffffff;
            background: #2563eb;
            margin-top: 12px;
            transition: 0.2s;
        }

        .signup-btn:hover { background: #1d4ed8; }

        .password-box {
            position: relative;
        }

        .password-box input { padding-right: 50px; }

        .password-box span {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 13px;
            color: #2563eb;
            font-weight: bold;
            user-select: none;
        }

        .message { margin-top: 10px; font-size: 14px; font-weight: bold; }
        .success { color: green; }
        .error { color: red; }

        .bottom-links {
            margin-top: 15px;
            font-size: 13px;
            color: #6b7280;
        }

        .bottom-links a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }

        .bottom-links a:hover { text-decoration: underline; }

        .role-fields { display: none; }
        .role-fields.active { display: block; }

        .divider {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 10px 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .signup-container { width: 92%; padding: 25px 18px; }
            .role-selector { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="signup-container">

    <h2>📅 EventHub Sign Up</h2>
    <p style="color: #6b7280; font-size: 13px; margin-bottom: 5px;">Create your account</p>

    <!-- Role Selector -->
    <div class="role-selector">
        <div class="role-option active-student" id="opt-student" onclick="pickRole('student')">
            <span class="role-emoji">🎓</span>
            <span class="role-text">Student</span>
        </div>
        <div class="role-option" id="opt-faculty" onclick="pickRole('faculty')">
            <span class="role-emoji">👨‍🏫</span>
            <span class="role-text">Faculty</span>
        </div>
        <div class="role-option" id="opt-admin" onclick="pickRole('admin')">
            <span class="role-emoji">🛡️</span>
            <span class="role-text">Admin</span>
        </div>
    </div>

    <form id="signupForm">

        <!-- Common Fields -->
        <p class="field-label">Full Name</p>
        <input type="text" id="signupName" placeholder="Enter your full name" required>

        <p class="field-label">Email</p>
        <input type="email" id="signupEmail" placeholder="Enter your email" required>

        <p class="field-label">Phone Number</p>
        <input type="tel" id="signupPhone" placeholder="+91 XXXXX XXXXX">

        <!-- Student Fields -->
        <div class="role-fields active" id="fields-student">
            <hr class="divider">
            <p class="field-label">Student ID</p>
            <input type="text" id="signupStudentId" placeholder="e.g. 2023CS042">

            <p class="field-label">Department</p>
            <select id="signupDepartment">
                <option value="">Select Department</option>
                <option value="CSE">Computer Science & Engineering</option>
                <option value="ECE">Electronics & Communication</option>
                <option value="ME">Mechanical Engineering</option>
                <option value="CE">Civil Engineering</option>
                <option value="EEE">Electrical Engineering</option>
                <option value="IT">Information Technology</option>
                <option value="BT">Biotechnology</option>
            </select>

            <p class="field-label">Year</p>
            <select id="signupYear">
                <option value="">Select Year</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
            </select>
        </div>

        <!-- Faculty Fields -->
        <div class="role-fields" id="fields-faculty">
            <hr class="divider">
            <p class="field-label">Faculty ID</p>
            <input type="text" id="signupFacultyId" placeholder="e.g. FAC2023015">

            <p class="field-label">Designation</p>
            <select id="signupDesignation">
                <option value="">Select Designation</option>
                <option value="Assistant Professor">Assistant Professor</option>
                <option value="Associate Professor">Associate Professor</option>
                <option value="Professor">Professor</option>
                <option value="HOD">Head of Department</option>
                <option value="Club President">Club President</option>
                <option value="Club Secretary">Club Secretary</option>
            </select>

            <p class="field-label">Department</p>
            <select id="signupFacultyDept">
                <option value="">Select Department</option>
                <option value="CSE">Computer Science & Engineering</option>
                <option value="ECE">Electronics & Communication</option>
                <option value="ME">Mechanical Engineering</option>
                <option value="CE">Civil Engineering</option>
                <option value="IT">Information Technology</option>
            </select>
        </div>

        <!-- Admin Fields -->
        <div class="role-fields" id="fields-admin">
            <hr class="divider">
            <p class="field-label">Admin ID</p>
            <input type="text" id="signupAdminId" placeholder="e.g. ADM002">

            <p class="field-label">Department</p>
            <input type="text" id="signupAdminDept" placeholder="e.g. IT Administration">
        </div>

        <hr class="divider">

        <p class="field-label">Password</p>
        <div class="password-box">
            <input type="password" id="signupPassword" placeholder="Create a password (min 6 chars)" required minlength="6">
            <span onclick="togglePass('signupPassword', this)">Show</span>
        </div>

        <p class="field-label">Confirm Password</p>
        <div class="password-box">
            <input type="password" id="signupConfirmPass" placeholder="Confirm your password" required>
            <span onclick="togglePass('signupConfirmPass', this)">Show</span>
        </div>

        <button type="submit" class="signup-btn" id="signupBtn">Create Account →</button>

        <p id="signupMessage" class="message"></p>
    </form>

    <div class="bottom-links">
        <p>Already have an account? <a href="select-role.html">Login</a></p>
    </div>

</div>

<script>

let signupRole = "student"; // default

// Initialize role UI
pickRole(signupRole);

function pickRole(role) {
    signupRole = role;

    // reset options
    document.querySelectorAll('.role-option')
        .forEach(opt => opt.className = 'role-option');

    document.querySelectorAll('.role-fields')
        .forEach(f => f.classList.remove('active'));

    // activate selected
    if (role === 'student') {
        document.getElementById('opt-student').classList.add('active-student');
        document.getElementById('fields-student').classList.add('active');
    } 
    else if (role === 'faculty') {
        document.getElementById('opt-faculty').classList.add('active-faculty');
        document.getElementById('fields-faculty').classList.add('active');
    } 
    else if (role === 'admin') {
        document.getElementById('opt-admin').classList.add('active-admin');
        document.getElementById('fields-admin').classList.add('active');
    }

    localStorage.setItem('selectedRole', role);
}


// 🔥 HANDLE SIGNUP
document.getElementById('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    console.log("Signup clicked");

    const message = document.getElementById('signupMessage');

    // basic fields
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const phoneInput = document.getElementById('signupPhone').value;
    const password = document.getElementById('signupPassword').value;
    const confirmPass = document.getElementById('signupConfirmPass').value;

    // validation
    if (!name || !email || !password) {
        message.textContent = "Please fill required fields!";
        message.className = "message error";
        return;
    }

    if (password !== confirmPass) {
        message.textContent = "Passwords do not match!";
        message.className = "message error";
        return;
    }

    if (!signupRole) {
        message.textContent = "Please select a role!";
        message.className = "message error";
        return;
    }

// STEP 1: remove everything except digits
let digits = phoneInput.replace(/[^0-9]/g, "");

console.log("Digits only:", digits);

// STEP 2: handle +91 or extra digits
if (digits.length > 10) {
    digits = digits.slice(digits.length - 10);
}

console.log("Final phone:", digits);

// STEP 3: validate
const phoneRegex = /^[6-9]\d{9}$/;

if (!phoneRegex.test(digits)) {
    message.textContent = "Enter a valid phone number!";
    message.className = "message error";
    return;
}

// use this cleaned phone
const phone = digits;
    // 🔥 BUILD USER OBJECT
    let user = {
        name,
        email,
        phone,
        password,
        role: signupRole
    };

    // role-specific validation + data
    if (signupRole === "student") {
        const studentId = document.getElementById('signupStudentId').value.trim();

        if (!studentId) {
            message.textContent = "Student ID required!";
            message.className = "message error";
            return;
        }

        user.studentId = studentId;
        user.department = document.getElementById('signupDepartment').value;
        user.year = document.getElementById('signupYear').value;
    }

    if (signupRole === "faculty") {
        const facultyId = document.getElementById('signupFacultyId').value.trim();

        if (!facultyId) {
            message.textContent = "Faculty ID required!";
            message.className = "message error";
            return;
        }

        user.facultyId = facultyId;
        user.designation = document.getElementById('signupDesignation').value;
        user.department = document.getElementById('signupFacultyDept').value;
    }

    if (signupRole === "admin") {
        const adminId = document.getElementById('signupAdminId').value.trim();

        if (!adminId) {
            message.textContent = "Admin ID required!";
            message.className = "message error";
            return;
        }

        user.adminId = adminId;
        user.department = document.getElementById('signupAdminDept').value;
    }

    console.log("USER DATA:", user);

    try {
        const res = await fetch("http://localhost:3000/api/auth/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(user)
        });

        const data = await res.json();

        console.log("Response:", data);

        if (data.message === "Signup successful") {
            message.textContent = "✅ Account created successfully!";
            message.className = "message success";

            setTimeout(() => {
                window.location.href = "role-login.html";
            }, 1000);

        } else {
            message.textContent = data.message || "Signup failed!";
            message.className = "message error";
        }

    } catch (err) {
        console.error(err);
        message.textContent = "Server error!";
        message.className = "message error";
    }
});


// 🔥 PASSWORD TOGGLE
function togglePass(inputId, spanEl) {
    const input = document.getElementById(inputId);

    if (input.type === 'password') {
        input.type = 'text';
        spanEl.textContent = 'Hide';
    } else {
        input.type = 'password';
        spanEl.textContent = 'Show';
    }
}

</script>

</body>
</html>
